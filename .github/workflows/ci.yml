# ════════════════════════════════════════════════
# VENOM — CI/CD Pipeline
# GitHub Actions workflow
# Runs on every push to main
# ════════════════════════════════════════════════

name: CI — Build & Deploy VENOM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: VALIDATE ──────────────────────────
  validate:
    name: Validate Game Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking game files..."
          test -f Venom/index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)
          test -f Venom/style.css  && echo "✅ style.css found"  || (echo "❌ style.css missing"  && exit 1)
          test -f Venom/game.js    && echo "✅ game.js found"    || (echo "❌ game.js missing"    && exit 1)
          echo "All required files present — build passed ✅"

      - name: Check HTML structure
        run: |
          echo "Checking index.html structure..."
          grep -q "game-canvas"    Venom/index.html && echo "✅ Canvas element found"
          grep -q "game.js"        Venom/index.html && echo "✅ game.js linked"
          grep -q "style.css"      Venom/index.html && echo "✅ style.css linked"
          echo "HTML structure valid ✅"

      - name: Check JS syntax
        run: |
          echo "Checking game.js syntax..."
          node --check Venom/game.js && echo "✅ game.js syntax valid"

  # ── JOB 2: DOCKER BUILD ──────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd Venom
          docker build -t venom-game:latest .
          echo "✅ Docker image built successfully"

      - name: Verify container serves files
        run: |
          docker run -d -p 8080:80 --name venom-test venom-game:latest
          sleep 2
          curl -f http://localhost:8080 && echo "✅ Container serving correctly"
          docker stop venom-test